<!DOCTYPE html><html><head><meta charset="UTF-8"/></head><body>
<script src="config.js"></script>
<script>
if(!requireAuth("Student"))throw 0;

renderLayout("Hostel Information",STUDENT_NAV,`
<div>
  <!-- Pinned announcements from API -->
  <div id="pinned-container"></div>

  <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:20px">
    <div class="card">
      <div style="font-size:24px;margin-bottom:10px">🏠</div>
      <h3 style="font-family:'Playfair Display',serif;font-size:14px;font-weight:700;color:#1a1a1a;margin-bottom:8px">About the Hostel</h3>
      <p style="font-size:13px;color:#555;line-height:1.7">Our hostel offers clean, safe and affordable accommodation for all students. We have Block A (female), Block B (male), and Block C (postgraduate) with modern amenities and 24-hour security.</p>
    </div>
    <div class="card">
      <div style="font-size:24px;margin-bottom:10px">📋</div>
      <h3 style="font-family:'Playfair Display',serif;font-size:14px;font-weight:700;color:#1a1a1a;margin-bottom:8px">Hostel Rules</h3>
      <ul style="font-size:13px;color:#555;line-height:1.9;padding-left:16px">
        <li>Lights out by 11:00 PM on weekdays</li>
        <li>No visitors after 8:00 PM</li>
        <li>Keep common areas clean at all times</li>
        <li>No noise after 10:00 PM</li>
        <li>Report maintenance issues promptly</li>
      </ul>
    </div>
    <div class="card">
      <div style="font-size:24px;margin-bottom:10px">⏰</div>
      <h3 style="font-family:'Playfair Display',serif;font-size:14px;font-weight:700;color:#1a1a1a;margin-bottom:8px">Office Hours</h3>
      <div style="font-size:13px;color:#555;line-height:2">
        <div style="display:flex;justify-content:space-between;border-bottom:1px solid rgba(0,0,0,.05);padding:4px 0"><span>Monday – Friday</span><span style="font-weight:600;color:#1a1a1a">8:00 AM – 5:00 PM</span></div>
        <div style="display:flex;justify-content:space-between;border-bottom:1px solid rgba(0,0,0,.05);padding:4px 0"><span>Saturday</span><span style="font-weight:600;color:#1a1a1a">9:00 AM – 1:00 PM</span></div>
        <div style="display:flex;justify-content:space-between;padding:4px 0"><span>Sunday</span><span style="font-weight:600;color:#5C0A0A">Closed</span></div>
      </div>
    </div>
    <div class="card">
      <div style="font-size:24px;margin-bottom:10px">📞</div>
      <h3 style="font-family:'Playfair Display',serif;font-size:14px;font-weight:700;color:#1a1a1a;margin-bottom:8px">Contact</h3>
      <div style="font-size:13px;color:#555;line-height:1.9">
        <p>📧 hostel@university.edu.ng</p>
        <p>📱 +234 803 000 0001</p>
        <p>🏢 Students Affairs Office, Block D</p>
      </div>
      <a href="student-messages.html" class="btn btn-primary btn-sm" style="text-decoration:none;display:inline-flex;margin-top:12px">Message Admin →</a>
    </div>
  </div>

  <div class="card">
    <h3 class="section-title">All Announcements</h3>
    <div id="ann-list"><p style="font-size:13px;color:#888">Loading announcements…</p></div>
  </div>
</div>
`,"student-info.html");

const catStyle={
  info:{bg:"rgba(230,236,244,.9)",border:"#1a3a6b",icon:"ℹ️",label:"Info"},
  warning:{bg:"rgba(254,243,221,.9)",border:"#b45309",icon:"⚠️",label:"Warning"},
  urgent:{bg:"rgba(253,232,232,.9)",border:"#5C0A0A",icon:"🚨",label:"Urgent"},
  notice:{bg:"rgba(230,244,236,.9)",border:"#1a6b3a",icon:"✅",label:"Notice"},
};

(async()=>{
  try{
    const anns=await apiFetch("/announcement")||[];
    const pinned=anns.filter(a=>a.isPinned);
    const pc=document.getElementById("pinned-container");
    if(pinned.length){
      pc.innerHTML=pinned.map(a=>{
        const s=catStyle[a.category]||catStyle.info;
        return `<div style="background:${s.bg};border-left:4px solid ${s.border};border-radius:10px;padding:14px 18px;margin-bottom:14px;display:flex;gap:12px">
          <div style="font-size:20px;flex-shrink:0">📌</div>
          <div><div style="display:flex;align-items:center;gap:8px;margin-bottom:4px">
            <p style="font-size:13.5px;font-weight:700;color:#1a1a1a">${a.title}</p>
            <span style="background:rgba(0,0,0,.08);color:#444;padding:1px 8px;border-radius:20px;font-size:10px;font-weight:600">PINNED</span>
          </div>
          <p style="font-size:13px;color:#444;line-height:1.6">${a.body}</p>
          <p style="font-size:11px;color:#888;margin-top:6px">Posted by ${a.createdBy} · ${formatDateShort(a.createdAt)}</p>
          </div></div>`;
      }).join("");
    }

    const el=document.getElementById("ann-list");
    if(!anns.length){el.innerHTML='<div class="empty-state"><div class="icon">📢</div><p>No announcements yet.</p></div>';return;}
    el.innerHTML=anns.map(a=>{
      const s=catStyle[a.category]||catStyle.info;
      return `<div style="border-left:3px solid ${s.border};padding:12px 16px;margin-bottom:12px;background:${s.bg};border-radius:0 8px 8px 0">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:5px">
          <p style="font-size:13.5px;font-weight:700;color:#1a1a1a">${s.icon} ${a.title}</p>
          <span style="font-size:11px;color:#888">${formatDateShort(a.createdAt)}</span>
        </div>
        <p style="font-size:13px;color:#444;line-height:1.6">${a.body}</p>
      </div>`;
    }).join("");
  }catch(e){
    document.getElementById("ann-list").innerHTML=`<p style="color:#888;font-size:13px">Could not load announcements: ${e.message}</p>`;
  }
})();
</script></body></html>
