<!DOCTYPE html><html><head><meta charset="UTF-8"/></head><body>
<script src="config.js"></script>
<script>
if (!requireAuth("Student")) throw 0;

renderLayout("My Hostel Status", STUDENT_NAV, `
  <div id="root" style="max-width:860px"><p style="color:#8a8a8a;font-size:13.5px">Loading your status…</p></div>
`, "student-status.html");

(async () => {
  const root = document.getElementById("root");

  // GET /api/allocation/mine  → AllocationDto or 404
  let alloc = null;
  try { alloc = await apiFetch("/allocation/mine"); } catch (_) {}

  // GET /api/payment/mine  → PaymentDto[]
  let payments = [];
  try { payments = await apiFetch("/payment/mine") || []; } catch (_) {}

  if (!alloc) {
    root.innerHTML = `
      <div class="card" style="max-width:520px;text-align:center;padding:46px 30px">
        <div style="font-size:52px;margin-bottom:14px">🏠</div>
        <h2 style="font-family:'Playfair Display',serif;font-size:19px;font-weight:700;color:#1a1a1a;margin-bottom:8px">No Room Allocated Yet</h2>
        <p style="color:#6b6b6b;font-size:13.5px;line-height:1.6;margin-bottom:22px">You have not been allocated a hostel room. Browse available rooms and complete payment to secure your accommodation.</p>
        <a href="rooms.html" class="btn btn-primary" style="text-decoration:none;display:inline-flex">Browse Available Rooms →</a>
      </div>`;
    speak("You have no room allocation yet. Please browse and book a room.");
    return;
  }

  // AllocationDto fields: roomNumber, hostelBlock, roomType, paymentReference, isActive, allocatedAt, matricNumber, studentEmail
  root.innerHTML = `
    <div class="card" style="border:2px solid #5C0A0A;margin-bottom:20px">
      <div style="display:flex;align-items:center;gap:14px;margin-bottom:18px">
        <div style="width:50px;height:50px;background:#fde8e8;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:24px">🛏</div>
        <div>
          <div style="display:flex;align-items:center;gap:8px">
            <h2 style="font-family:'Playfair Display',serif;font-size:19px;font-weight:800;color:#1a1a1a">Room ${alloc.roomNumber}</h2>
            <span class="badge badge-success">${alloc.isActive ? "Active" : "Inactive"}</span>
          </div>
          <p style="color:#6b6b6b;font-size:13px">${alloc.hostelBlock} · ${alloc.roomType}</p>
        </div>
      </div>
      <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px">
        ${[["Room Number",alloc.roomNumber],["Hostel Block",alloc.hostelBlock],["Room Type",alloc.roomType],
           ["Payment Ref",alloc.paymentReference],["Allocated On",formatDateShort(alloc.allocatedAt)],
           ["Status",alloc.isActive?"Active ✓":"Inactive"]].map(([k,v])=>`
          <div style="background:#f5f5f5;border-radius:8px;padding:12px">
            <p style="font-size:10px;font-weight:700;letter-spacing:.7px;text-transform:uppercase;color:#8a8a8a;margin-bottom:3px">${k}</p>
            <p style="font-size:13.5px;font-weight:600;color:#1a1a1a;word-break:break-all">${v}</p>
          </div>`).join("")}
      </div>
    </div>

    <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:20px">
      <div class="card">
        <h3 class="section-title">Account Standing</h3>
        <div style="display:flex;align-items:center;gap:12px">
          <div style="width:44px;height:44px;background:#e6f4ec;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px">✅</div>
          <div><p style="font-size:14.5px;font-weight:700;color:#1a6b3a">In Good Standing</p><p style="font-size:12px;color:#8a8a8a">No violations on record</p></div>
        </div>
      </div>
      <div class="card">
        <h3 class="section-title">Student Details</h3>
        <p style="font-size:16px;font-weight:700;color:#1a1a1a">${alloc.matricNumber || "—"}</p>
        <p style="font-size:12px;color:#8a8a8a;margin-top:2px">${alloc.studentEmail}</p>
      </div>
    </div>

    <div class="card">
      <h3 class="section-title">Payment History</h3>
      ${!payments.length ? `<div class="empty-state"><div class="icon">💳</div><p>No payment records found.</p></div>` : `
        <div style="overflow-x:auto">
          <table class="data-table">
            <thead><tr><th>Reference</th><th>Room</th><th>Amount</th><th>Status</th><th>Date</th></tr></thead>
            <tbody>
              ${payments.map(p=>`
                <tr>
                  <td style="font-family:monospace;font-size:11.5px;color:#6b6b6b">${p.reference}</td>
                  <td style="font-weight:600">${p.roomNumber}</td>
                  <td style="font-weight:700;color:#1a1a1a">${formatMoney(p.amount)}</td>
                  <td><span class="badge ${badgeClass(p.status)}">${p.status}</span></td>
                  <td style="font-size:12px;color:#8a8a8a">${formatDateShort(p.createdAt)}</td>
                </tr>`).join("")}
            </tbody>
          </table>
        </div>`}
    </div>`;

  speak(`Your room ${alloc.roomNumber} in ${alloc.hostelBlock} is ${alloc.isActive ? "active" : "inactive"}.`);
})();
</script></body></html>
