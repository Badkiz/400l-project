<!DOCTYPE html><html><head><meta charset="UTF-8"/></head><body>
<script src="config.js"></script>
<script>
if(!requireAuth("Student"))throw 0;
const currentUser = getUser();
let activePartnerId = null;

renderLayout("Messages", STUDENT_NAV, `
<div style="display:grid;grid-template-columns:260px 1fr;gap:16px;height:calc(100vh - 110px)">

  <!-- Conversations -->
  <div class="card" style="padding:0;display:flex;flex-direction:column;overflow:hidden">
    <div style="padding:13px 15px;border-bottom:1px solid rgba(0,0,0,.06)">
      <h3 style="font-family:'Playfair Display',serif;font-size:13.5px;font-weight:700;color:#1a1a1a">Conversations</h3>
    </div>
    <div id="conv-list" style="flex:1;overflow-y:auto;padding:8px"></div>
  </div>

  <!-- Chat panel -->
  <div class="card" style="padding:0;display:flex;flex-direction:column;overflow:hidden">
    <div style="padding:11px 16px;border-bottom:1px solid rgba(0,0,0,.06);background:#f8f8f8;display:flex;align-items:center;gap:10px">
      <div id="chat-av" style="width:32px;height:32px;background:#5C0A0A;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#fff;flex-shrink:0">A</div>
      <div>
        <p id="chat-name" style="font-size:13.5px;font-weight:700;color:#1a1a1a">Hostel Administration</p>
        <p id="chat-role" style="font-size:11px;color:#888">Admin</p>
      </div>
    </div>

    <div id="msgs-area" style="flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:10px;background:#fafafa">
      <div style="text-align:center;padding:32px 0;color:#aaa;font-size:13px">Send a message to the hostel admin below.</div>
    </div>

    <div style="padding:11px 13px;border-top:1px solid rgba(0,0,0,.06);display:flex;gap:8px;background:#fff">
      <input id="msg-input" type="text" class="form-input" style="flex:1;color:#1a1a1a" placeholder="Type a message…"/>
      <button id="send-btn" class="btn btn-primary btn-sm">Send</button>
    </div>
  </div>
</div>
`, "student-messages.html");

async function loadConversations(){
  const list = document.getElementById("conv-list");
  try{
    const convs = await apiFetch("/message/conversations") || [];
    // Always show admin at top
    const hasAdmin = convs.some(c => c.role === "Admin");
    const items = hasAdmin ? convs : [{userId:1,userName:"Administrator",role:"Admin",unreadCount:0,lastMessage:null}, ...convs];
    list.innerHTML = items.map(c=>`
      <div id="cv-${c.userId}" onclick="openConv(${c.userId},'${c.userName}','${c.role}')"
        style="cursor:pointer;padding:10px 9px;border-radius:8px;margin-bottom:3px;transition:background .12s;position:relative"
        onmouseover="this.style.background='rgba(92,10,10,.06)'" onmouseout="if(activePartnerId!==${c.userId})this.style.background='transparent'">
        <div style="display:flex;align-items:center;gap:9px">
          <div style="width:32px;height:32px;background:#5C0A0A;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#fff;flex-shrink:0">${c.userName[0]}</div>
          <div style="flex:1;min-width:0">
            <div style="display:flex;align-items:center;justify-content:space-between">
              <p style="font-size:13px;font-weight:600;color:#1a1a1a">${c.userName}</p>
              ${c.unreadCount>0?`<span style="background:#5C0A0A;color:#fff;font-size:10px;font-weight:700;padding:1px 6px;border-radius:20px">${c.unreadCount}</span>`:""}
            </div>
            <p style="font-size:11px;color:#888;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${c.lastMessage?.text||"No messages yet"}</p>
          </div>
        </div>
      </div>`).join("");
    openConv(1,"Administrator","Admin");
  }catch(e){
    list.innerHTML=`<p style="font-size:12.5px;color:#5C0A0A;padding:12px 8px">${e.message}</p>`;
  }
}

async function openConv(partnerId, name, role){
  activePartnerId = partnerId;
  document.getElementById("chat-name").textContent = name;
  document.getElementById("chat-role").textContent = role;
  document.getElementById("chat-av").textContent   = name[0];
  document.getElementById("msg-input").focus();

  document.querySelectorAll("[id^='cv-']").forEach(el=>el.style.background="transparent");
  const el = document.getElementById(`cv-${partnerId}`);
  if(el) el.style.background="rgba(92,10,10,.08)";

  await loadMessages(partnerId);
}

async function loadMessages(partnerId){
  const area = document.getElementById("msgs-area");
  area.innerHTML = `<p style="text-align:center;font-size:12.5px;color:#aaa;padding:20px 0">Loading…</p>`;
  try{
    const msgs = await apiFetch(`/message/conversation/${partnerId}`) || [];
    renderMessages(msgs);
  }catch(e){
    area.innerHTML = `<p style="text-align:center;font-size:12.5px;color:#5C0A0A;padding:20px 0">${e.message}</p>`;
  }
}

function renderMessages(msgs){
  const area = document.getElementById("msgs-area");
  if(!msgs.length){
    area.innerHTML=`<div style="text-align:center;padding:32px 0;color:#aaa;font-size:13px">No messages yet. Say hello!</div>`;
    return;
  }
  area.innerHTML = msgs.map(m=>{
    const mine = m.senderId === currentUser.id;
    return `<div style="display:flex;justify-content:${mine?"flex-end":"flex-start"}">
      <div style="max-width:70%">
        <div style="background:${mine?"#5C0A0A":"#ececec"};color:${mine?"#fff":"#1a1a1a"};
          padding:9px 13px;border-radius:${mine?"12px 12px 3px 12px":"12px 12px 12px 3px"};
          font-size:13.5px;line-height:1.5;word-break:break-word">${m.text}</div>
        <p style="font-size:10px;color:#aaa;margin-top:3px;text-align:${mine?"right":"left"}">${formatDate(m.timestamp)}</p>
      </div>
    </div>`;
  }).join("");
  area.scrollTop = area.scrollHeight;
}

async function sendMessage(){
  const input = document.getElementById("msg-input");
  const text  = input.value.trim();
  if(!text || !activePartnerId) return;
  input.value = "";
  try{
    await apiFetch("/message",{method:"POST",body:JSON.stringify({receiverId:activePartnerId,text})});
    await loadMessages(activePartnerId);
    speak("Message sent.");
  }catch(e){ showToast(e.message,"error"); }
}

document.getElementById("send-btn").addEventListener("click", sendMessage);
document.getElementById("msg-input").addEventListener("keydown", e=>{ if(e.key==="Enter") sendMessage(); });
setInterval(()=>{ if(activePartnerId) loadMessages(activePartnerId); }, 10000);

loadConversations();
</script></body></html>
