<!DOCTYPE html><html><head><meta charset="UTF-8"/></head><body>
<script src="config.js"></script>
<script>
if (!requireAuth("Admin")) throw 0;

renderLayout("Manage Rooms", ADMIN_NAV, `
<div>
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;flex-wrap:wrap;gap:10px">
    <div style="display:flex;gap:9px;flex-wrap:wrap">
      <input id="f-block" class="form-input" style="width:148px" placeholder="Filter block…" oninput="applyFilter()"/>
      <select id="f-type" class="form-input" style="width:136px" onchange="applyFilter()">
        <option value="">All Types</option><option>Single</option><option>Double</option><option>Quad</option>
      </select>
      <select id="f-status" class="form-input" style="width:148px" onchange="applyFilter()">
        <option value="">All Rooms</option><option value="available">Available</option>
        <option value="full">Full</option><option value="inactive">Inactive</option>
      </select>
    </div>
    <button onclick="openModal(null)" class="btn btn-primary">+ Add Room</button>
  </div>

  <div id="stats-strip" style="display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:18px"></div>

  <div class="card" style="padding:0;overflow:hidden">
    <div style="overflow-x:auto">
      <table class="data-table">
        <thead><tr><th>Room</th><th>Block</th><th>Type</th><th>Capacity</th><th>Occupancy</th><th>Price</th><th>Status</th><th>Actions</th></tr></thead>
        <tbody id="rooms-tbody"><tr><td colspan="8" style="text-align:center;padding:38px;color:#8a8a8a">Loading…</td></tr></tbody>
      </table>
    </div>
  </div>
</div>

<div class="modal-overlay" id="room-modal">
  <div class="modal-box">
    <h3 class="modal-title" id="modal-title">Add New Room</h3>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
      <div class="form-group"><label class="form-label">Room Number *</label><input id="r-num" class="form-input" placeholder="101"/></div>
      <div class="form-group"><label class="form-label">Hostel Block *</label><input id="r-blk" class="form-input" placeholder="Block A"/></div>
      <div class="form-group"><label class="form-label">Room Type *</label>
        <select id="r-typ" class="form-input"><option>Single</option><option>Double</option><option>Quad</option></select>
      </div>
      <div class="form-group"><label class="form-label">Capacity *</label><input id="r-cap" type="number" min="1" max="12" class="form-input" placeholder="2"/></div>
      <div class="form-group" style="grid-column:span 2"><label class="form-label">Price (₦) *</label><input id="r-prc" type="number" min="0" class="form-input" placeholder="75000"/></div>
      <div class="form-group" style="grid-column:span 2"><label class="form-label">Description</label><textarea id="r-dsc" class="form-input" rows="2" style="resize:none" placeholder="Optional…"></textarea></div>
      <div id="r-act-row" class="form-group" style="grid-column:span 2;display:none;align-items:center;gap:8px">
        <input id="r-act" type="checkbox" checked style="width:14px;height:14px;accent-color:#5C0A0A"/>
        <label class="form-label" style="margin:0">Room is active</label>
      </div>
    </div>
    <div style="display:flex;gap:9px;margin-top:4px">
      <button onclick="closeModal()" class="btn btn-secondary" style="flex:1">Cancel</button>
      <button id="modal-save" onclick="saveRoom()" class="btn btn-primary" style="flex:1">Save Room</button>
    </div>
  </div>
</div>
`, "admin-rooms.html");

let allRooms = [], editId = null;

async function loadRooms() {
  try {
    // GET /api/room?activeOnly=false  → RoomDto[]
    allRooms = await apiFetch("/room?activeOnly=false") || [];
    renderStats(allRooms);
    renderRooms(allRooms);
  } catch (e) { showToast(e.message, "error"); }
}

function renderStats(rooms) {
  const active = rooms.filter(r => r.isActive);
  document.getElementById("stats-strip").innerHTML = [
    {label:"Total Rooms",     val:active.length,                                   accent:"#5C0A0A"},
    {label:"Available Slots", val:active.reduce((s,r)=>s+r.availableSlots,0),      accent:"#1a6b3a"},
    {label:"Occupied Slots",  val:active.reduce((s,r)=>s+r.occupiedSlots,0),       accent:"#7c4a00"},
    {label:"Full Rooms",      val:active.filter(r=>r.availableSlots<=0).length,    accent:"#1a3a6b"},
  ].map(s=>`<div class="stat-card" style="--accent:${s.accent}"><div class="stat-label">${s.label}</div><div class="stat-value">${s.val}</div></div>`).join("");
}

function applyFilter() {
  const blk = document.getElementById("f-block").value.toLowerCase();
  const typ = document.getElementById("f-type").value;
  const st  = document.getElementById("f-status").value;
  let r = allRooms;
  if (blk) r = r.filter(x => x.hostelBlock.toLowerCase().includes(blk));
  if (typ) r = r.filter(x => x.roomType === typ);
  if (st==="available") r = r.filter(x => x.isActive && x.availableSlots>0);
  if (st==="full")      r = r.filter(x => x.availableSlots<=0);
  if (st==="inactive")  r = r.filter(x => !x.isActive);
  renderRooms(r);
}

function renderRooms(rooms) {
  const tbody = document.getElementById("rooms-tbody");
  if (!rooms.length) { tbody.innerHTML = `<tr><td colspan="8" style="text-align:center;padding:44px;color:#8a8a8a">No rooms found.</td></tr>`; return; }
  tbody.innerHTML = rooms.map(r => {
    const pct = r.capacity ? Math.round((r.occupiedSlots/r.capacity)*100) : 0;
    const bar = pct>=100 ? "#5C0A0A" : pct>=70 ? "#b45309" : "#1a6b3a";
    return `<tr>
      <td style="font-weight:700;color:#1a1a1a">${r.roomNumber}</td>
      <td>${r.hostelBlock}</td>
      <td><span class="badge badge-primary">${r.roomType}</span></td>
      <td>${r.capacity}</td>
      <td>
        <div style="display:flex;align-items:center;gap:7px">
          <div class="progress-track" style="width:68px"><div class="progress-fill" style="width:${pct}%;background:${bar}"></div></div>
          <span style="font-size:11.5px;color:#6b6b6b">${r.occupiedSlots}/${r.capacity}</span>
        </div>
      </td>
      <td style="font-weight:600">${formatMoney(r.price)}</td>
      <td><span class="badge ${r.isActive?(r.availableSlots>0?"badge-success":"badge-danger"):"badge-warning"}">${r.isActive?(r.availableSlots>0?"Available":"Full"):"Inactive"}</span></td>
      <td>
        <div style="display:flex;gap:7px">
          <button onclick='openModal(${JSON.stringify(r)})' class="btn btn-secondary btn-sm">Edit</button>
          <button onclick="deactivate(${r.id})" class="btn btn-danger btn-sm">Remove</button>
        </div>
      </td>
    </tr>`;
  }).join("");
}

function openModal(room) {
  editId = room?.id || null;
  document.getElementById("modal-title").textContent = room ? "Edit Room" : "Add New Room";
  document.getElementById("r-num").value = room?.roomNumber || "";
  document.getElementById("r-blk").value = room?.hostelBlock || "";
  document.getElementById("r-typ").value = room?.roomType || "Single";
  document.getElementById("r-cap").value = room?.capacity || "";
  document.getElementById("r-prc").value = room?.price || "";
  document.getElementById("r-dsc").value = room?.description || "";
  const ar = document.getElementById("r-act-row");
  ar.style.display = room ? "flex" : "none";
  if (room) document.getElementById("r-act").checked = room.isActive;
  document.getElementById("room-modal").classList.add("open");
}
function closeModal() { document.getElementById("room-modal").classList.remove("open"); editId = null; }

async function saveRoom() {
  // CreateRoomRequest: { roomNumber, hostelBlock, roomType, capacity, price, description }
  // UpdateRoomRequest: { roomNumber?, hostelBlock?, roomType?, capacity?, price?, description?, isActive? }
  const body = {
    roomNumber:  document.getElementById("r-num").value.trim(),
    hostelBlock: document.getElementById("r-blk").value.trim(),
    roomType:    document.getElementById("r-typ").value,
    capacity:    parseInt(document.getElementById("r-cap").value),
    price:       parseFloat(document.getElementById("r-prc").value),
    description: document.getElementById("r-dsc").value.trim() || null,
    isActive:    document.getElementById("r-act").checked,
  };
  if (!body.roomNumber || !body.hostelBlock || !body.capacity || !body.price) { showToast("Fill in all required fields.", "warning"); return; }
  const btn = document.getElementById("modal-save");
  btn.textContent = "Saving…"; btn.disabled = true;
  try {
    if (editId) await apiFetch(`/room/${editId}`, { method:"PUT",  body: JSON.stringify(body) });
    else        await apiFetch(`/room`,           { method:"POST", body: JSON.stringify(body) });
    showToast(editId ? "Room updated." : "Room created.", "success");
    closeModal(); loadRooms();
  } catch (e) { showToast(e.message, "error"); }
  finally { btn.textContent = "Save Room"; btn.disabled = false; }
}

async function deactivate(id) {
  if (!confirm("Deactivate this room? Students won't be able to book it.")) return;
  try {
    // DELETE /api/room/{id}
    await apiFetch(`/room/${id}`, { method:"DELETE" });
    showToast("Room deactivated.", "success"); loadRooms();
  } catch (e) { showToast(e.message, "error"); }
}

loadRooms();
</script></body></html>
